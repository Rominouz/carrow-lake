        <div id="blackout"></div>

        <div id="sh" class="screen active" style="background:#010108;">
            <div style="position:relative; flex:1; overflow:hidden; display:flex; align-items:flex-end;">
                <svg viewBox="0 0 355 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;" preserveAspectRatio="xMidYMid slice">
                    <defs>
                        <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#010108"/><stop offset="28%" stop-color="#020418"/><stop offset="58%" stop-color="#050828"/><stop offset="100%" stop-color="#090d34"/></linearGradient>
                        <linearGradient id="lakeG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#04071c"/><stop offset="100%" stop-color="#02030c"/></linearGradient>
                        <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#05071a"/><stop offset="100%" stop-color="#030510"/></linearGradient>
                        <radialGradient id="mglow" cx="50%" cy="50%"><stop offset="0%" stop-color="#e0d898" stop-opacity=".45"/><stop offset="55%" stop-color="#e0d898" stop-opacity=".1"/><stop offset="100%" stop-color="#e0d898" stop-opacity="0"/></radialGradient>
                        <radialGradient id="vig" cx="50%" cy="40%" r="65%"><stop offset="35%" stop-opacity="0"/><stop offset="100%" stop-color="#010108" stop-opacity=".8"/></radialGradient>
                        <filter id="wf" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5"/></filter>
                        <filter id="mf" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>
                    </defs>
                    <rect width="355" height="500" fill="url(#skyG)"/>
                    <rect width="355" height="500" fill="url(#vig)"/>
                </svg>
                <div style="position:absolute;top:42px;left:0;right:0;text-align:center;pointer-events:none">
                    <div class="cf1" style="font-size:8px;letter-spacing:5px;color:#a09070;margin-bottom:12px;font-family:Georgia,serif">UNE HISTOIRE DE MYSTÈRE</div>
                    <div class="cf2" style="font-size:34px;letter-spacing:10px;color:#e8e0c8;text-shadow:0 4px 30px #000,0 0 60px rgba(0,0,0,.9)">CARROW</div>
                    <div class="cf3" style="font-size:34px;letter-spacing:10px;color:#e8e0c8;font-weight:700;text-shadow:0 4px 30px #000,0 0 60px rgba(0,0,0,.9);margin-top:-5px">LAKE</div>
                </div>
            </div>
            <div style="background:rgba(10,10,20,.8);backdrop-filter:blur(15px);border-top:1px solid rgba(255,255,255,.05);padding-bottom:20px">
                <button class="hb" onclick="startPlay()" style="background:linear-gradient(90deg,#153820,#0a2012);color:#5dd474"><span>▶&nbsp;&nbsp;JOUER</span><span id="svhi" style="font-size:9px;opacity:.7"></span></button>
                <button class="hb" onclick="resetGame()" style="background:linear-gradient(90deg,#2d0a44,#1a052a);color:#ae5ee0;border-top:1px solid #190628"><span>↺&nbsp;&nbsp;RECOMMENCER</span><span style="font-size:9px;opacity:.6">TOUT EFFACER</span></button>
                <div style="padding:17px 22px;background:#09091a;display:flex;align-items:center;justify-content:center;border-top:1px solid #0f0f22;cursor:not-allowed;position:relative;overflow:hidden;border-radius:8px;margin:10px 15px 0 15px">
                    <div style="display:flex;align-items:center;gap:12px;color:#1c2238;font-size:16px;font-weight:700;letter-spacing:1px;filter:blur(.5px) opacity(.35)"><i class="ti ti-lock" style="font-size:18px"></i> SUCCÈS BIENTÔT DISPONIBLE</div>
                </div>
            </div>
        </div>

        <div id="schar" class="screen" style="background:#05050f;padding:60px 24px 36px">
            <div style="text-align:center;flex:1">
                <div class="cf1" style="font-size:9px;letter-spacing:6px;color:#504880;margin-bottom:12px;font-family:Georgia,serif">AVANT DE COMMENCER</div>
                <div class="cf2" style="font-size:24px;color:#c8c0e8;margin-bottom:8px">Qui êtes-vous ?</div>
                <div class="cf3" style="font-size:12px;color:#4a407a;margin-bottom:45px">Votre choix façonnera l'histoire</div>
                <div class="cf4" style="display:flex;gap:16px;width:100%">
                    <button onclick="pickChar('Elyos')" style="flex:1;background:#0d0c20;border:1px solid #3c3080;border-radius:18px;padding:24px 10px;cursor:pointer;text-align:center;transition:all .2s">
                        <div style="width:65px;height:65px;border-radius:50%;background:#161330;border:2px solid #4a4080;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px">🧢</div>
                        <div style="font-size:18px;color:#fff;margin-bottom:8px;font-weight:bold">Elyos</div>
                        <div style="font-size:11px;color:#8a80ba;line-height:1.7">Blond aux yeux bleus.<br>Simple mais remarqué.</div>
                    </button>
                    <div style="flex:1;background:#070710;border:1px solid #12112a;border-radius:18px;padding:24px 10px;text-align:center;position:relative;cursor:not-allowed">
                        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;border-radius:18px;background:rgba(3,2,10,.85)"><div style="text-align:center"><i class="ti ti-lock" style="font-size:24px;color:#3a305a;display:block;margin-bottom:8px"></i><div style="font-size:8px;color:#1a1430;letter-spacing:2.5px">BIENTÔT DISPONIBLE</div></div></div>
                        <div style="width:65px;height:65px;border-radius:50%;background:#0e0c22;border:2px solid #181630;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.2">👓</div>
                        <div style="font-size:18px;color:#403858;margin-bottom:8px;font-weight:bold">Lou</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="ssms" class="screen" style="background:#070712">
            <div style="background:rgba(17,17,40,.9);backdrop-filter:blur(10px);padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1a1a35;z-index:5">
                <button onclick="goScreen('sh')" style="background:none;border:none;cursor:pointer;color:#8070c8;font-size:18px"><i class="ti ti-chevron-left"></i></button>
                <div style="width:40px;height:40px;border-radius:50%;background:#181834;display:flex;align-items:center;justify-content:center"><i class="ti ti-user" style="font-size:20px;color:#343455"></i></div>
                <div><div style="font-size:15px;color:#e0d8ff;font-weight:600">Inconnu</div><div style="font-size:11px;color:#6a609a">Numéro non reconnu</div></div>
                <div style="margin-left:auto;font-size:10px;color:#a04040;border:1px solid #481818;background:rgba(72,24,24,.3);padding:4px 10px;border-radius:12px">⚠ SUSPECT</div>
            </div>
            <div id="smsg" style="flex:1;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:6px"></div>
            <div id="sch" style="padding:16px;border-top:1px solid #141428;background:#080818;display:flex;flex-direction:column;gap:10px;min-height:85px"></div>
        </div>
