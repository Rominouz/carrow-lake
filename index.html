<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrow Lake — Edition Complète</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
</head>
<body>
    <div id="clo">
        <div id="clg">
            <button id="audio-btn" onclick="AudioCore.toggle()"><i class="ti ti-volume" id="a-icon"></i></button>
            <div id="blackout"></div>

            <!-- MENU PRINCIPAL -->
            <div id="sh" class="screen active" style="background:#010108;">
                <div style="position:relative; flex:1; overflow:hidden; display:flex; align-items:flex-end;">
                    <!-- SVG Background is simplified here for clarity, keeping the UI structure -->
                    <div style="position:absolute;top:42px;left:0;right:0;text-align:center;pointer-events:none">
                        <div style="font-size:8px;letter-spacing:5px;color:#a09070;margin-bottom:12px;font-family:Georgia,serif">UNE HISTOIRE DE MYSTÈRE</div>
                        <div style="font-size:34px;letter-spacing:10px;color:#e8e0c8;text-shadow:0 4px 30px #000">CARROW</div>
                        <div style="font-size:34px;letter-spacing:10px;color:#e8e0c8;font-weight:700;text-shadow:0 4px 30px #000;margin-top:-5px">LAKE</div>
                    </div>
                </div>
                <div style="background:rgba(10,10,20,.8);backdrop-filter:blur(15px);border-top:1px solid rgba(255,255,255,.05);padding-bottom:20px">
                    <button class="hb" onclick="startPlay()"><span>▶&nbsp;&nbsp;JOUER</span><span id="svhi" style="font-size:9px;opacity:.7"></span></button>
                    <button class="hb" onclick="resetGame()"><span>↺&nbsp;&nbsp;RECOMMENCER</span></button>
                </div>
            </div>

            <!-- CHOIX PERSO -->
            <div id="schar" class="screen" style="background:#05050f;padding:60px 24px">
                <div style="text-align:center;">
                    <div style="font-size:9px;letter-spacing:6px;color:#504880;margin-bottom:12px">AVANT DE COMMENCER</div>
                    <h2 style="color:#fff;margin-bottom:40px">Qui êtes-vous ?</h2>
                    <button class="hb" onclick="pickChar('Elyos')" style="background:#0d0c20;border:1px solid #3c3080;border-radius:18px;height:auto;padding:20px">
                        <div style="font-size:30px">🧢</div>
                        <div style="font-size:18px;font-weight:bold;color:#fff">Elyos</div>
                        <div style="font-size:11px;color:#8a80ba">Blond aux yeux bleus.</div>
                    </button>
                </div>
            </div>

            <!-- ECRAN SMS -->
            <div id="ssms" class="screen" style="background:#070712">
                <div style="background:rgba(17,17,40,.9);padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1a1a35;">
                    <button onclick="goScreen('sh')" style="background:none;border:none;color:#8070c8;font-size:18px"><i class="ti ti-chevron-left"></i></button>
                    <div style="width:40px;height:40px;border-radius:50%;background:#181834;display:flex;align-items:center;justify-content:center"><i class="ti ti-user"></i></div>
                    <div><div style="font-size:15px;color:#e0d8ff;font-weight:600">Inconnu</div><div style="font-size:11px;color:#6a609a">Carrow Lake</div></div>
                </div>
                <div id="smsg" style="flex:1;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;gap:6px"></div>
                <div id="sch" style="padding:16px;background:#080818;display:flex;flex-direction:column;gap:10px;min-height:85px"></div>
            </div>

            <!-- ECRAN NARRATIF -->
            <div id="sn" class="screen" onclick="narrClick()">
                <div class="fog" id="fog"></div>
                <div id="snbg"></div><div id="snbg2"></div>
                <div id="sncn"><div id="snlb">CARROW LAKE</div><div id="sntx"></div></div>
                <div id="snft"><div id="snpg"><div id="snpg-bar"></div></div><span id="snhi">CONTINUER</span></div>
            </div>

            <!-- FIN NORMALE -->
            <div id="sso" class="screen" style="background:#05050f;align-items:center;justify-content:center;text-align:center">
                <div id="sso-content"></div>
                <button class="hb" onclick="resetGame()">RETOUR AU MENU</button>
            </div>

            <!-- ECRAN MORT -->
            <div id="sdeath" class="screen" style="background:#000;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px">
                <div>
                    <p class="death-narration" id="death-text"></p>
                    <h1 class="death-quote">« Carrow Lake garde désormais un secret de plus. »</h1>
                    <button class="hb" onclick="resetGame()" style="margin-top:40px">RECOMMENCER</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts chargés dans l'ordre -->
    <script src="decors.js"></script>
    <script src="moteur.js"></script>
    <script src="scene1.js"></script>
    <script src="scene2.js"></script>
    <script src="scene3.js"></script>
</body>
</html>
